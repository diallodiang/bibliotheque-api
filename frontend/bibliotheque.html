<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bibliothèque Dashboard PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<div class="container mx-auto p-6">
  <h1 class="text-3xl font-bold text-center mb-6">📚 Dashboard Bibliothèque PRO</h1>

  <!-- Statistiques -->
  <div class="flex justify-around mb-6">
    <div class="bg-blue-500 text-white p-4 rounded shadow w-1/3 text-center">
      <div>Total livres</div>
      <div id="totalBooks" class="text-2xl font-bold">0</div>
    </div>
    <div class="bg-green-500 text-white p-4 rounded shadow w-1/3 text-center">
      <div>Disponibles</div>
      <div id="availableBooks" class="text-2xl font-bold">0</div>
    </div>
  </div>

  <!-- Recherche -->
  <input type="text" id="search" placeholder="🔍 Rechercher..." onkeyup="searchBook()" class="w-full p-2 mb-4 border rounded">

  <!-- Formulaire -->
  <div class="mb-4 p-4 bg-white rounded shadow flex gap-2">
    <input type="hidden" id="bookId">
    <input type="text" id="title" placeholder="Titre" class="flex-1 p-2 border rounded">
    <input type="text" id="author" placeholder="Auteur" class="flex-1 p-2 border rounded">
    <input type="text" id="isbn" placeholder="Edition" class="flex-1 p-2 border rounded">
    <input type="file" id="image" class="flex-1 p-2 border rounded">
    <button onclick="saveBook()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">💾 Enregistrer</button>
  </div>

  <!-- Notification -->
  <div id="notification" class="hidden mb-4 p-2 rounded"></div>

  <!-- Table -->
  <div class="overflow-x-auto">
    <table class="w-full bg-white rounded shadow">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2">ID</th>
          <th class="p-2">Titre</th>
          <th class="p-2">Auteur</th>
          <th class="p-2">ISBN</th>
          <th class="p-2">Actions</th>
        </tr>
      </thead>
      <tbody id="bookList"></tbody>
    </table>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
